services:
  pretix:
    image: pretix/standalone:latest
    container_name: yadawi-pretix
    ports:
      - "${PRETIX_PORT:-8000}:80"
    environment:
      - PRETIX_SECRET_KEY=dev-secret-key-change-in-production
      - PRETIX_DATABASE_TYPE=postgresql
      - PRETIX_DATABASE_NAME=pretix
      - PRETIX_DATABASE_USER=pretix
      - PRETIX_DATABASE_PASSWORD=pretix
      - PRETIX_DATABASE_HOST=db
      - PRETIX_DATABASE_PORT=5432
      - PRETIX_REDIS_LOCATION=redis://cache:6379/0
      - PRETIX_REDIS_SESSION=true
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - PRETIX_MAIL_HOST=mail
      - PRETIX_MAIL_PORT=25
      - PRETIX_TIME_ZONE=Asia/Kuwait
      - PRETIX_SITE_URL=https://pretix.mawthook.io
      - PRETIX_DEFAULT_CURRENCY=KWD
    depends_on:
      - db
      - cache
      - rabbitmq
    volumes:
      - ./pretix-config:/pretix-config

  db:
    image: postgres:15
    container_name: yadawi-pretix-db
    environment:
      - POSTGRES_USER=pretix
      - POSTGRES_PASSWORD=pretix
      - POSTGRES_DB=pretix
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    container_name: yadawi-pretix-redis

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: yadawi-pretix-rabbitmq

  mail:
    image: mailhog/mailhog
    container_name: yadawi-pretix-mail

volumes:
  postgres_data:
